# Variant of starship.toml used when $PWD is on a slow filesystem
# (9p, drvfs, fuse.drvfs — typically Windows bind mounts inside WSL/devcontainers).
# Git_status is disabled here because `git status` lstat()s every indexed file
# across the FS boundary, which can take seconds.
#
# Selection logic lives in dotfiles/bash/bashrc.d/41-starship-fs.sh — it swaps
# $STARSHIP_CONFIG between this file and starship.toml based on `stat -f`.

format = """
$os\
$username\
[](bg:#0087af fg:#005f87)\
${custom.host}\
[](bg:#3a3a3a fg:#0087af)\
$directory\
[](bg:#1c1c1c fg:#3a3a3a)\
$git_branch\
[](fg:#1c1c1c)\
$fill\
$cmd_duration\
$status\
$jobs
$character"""

add_newline = true

command_timeout = 500

[fill]
symbol = " "

[character]
success_symbol = "[ λ ](bg:#005f87 fg:#ffffff bold)[](fg:#005f87)"
error_symbol   = "[ λ ](bg:#870000 fg:#ffffff bold)[](fg:#870000)"
vimcmd_symbol  = "[ λ ](bg:#5f5f00 fg:#ffffff bold)[](fg:#5f5f00)"

[username]
show_always = true
style_user = "bg:#005f87 fg:#ffffff bold"
style_root = "bg:#005f87 fg:#ffffff bold"
format = "[ $user ]($style)"

[hostname]
disabled = true

[custom.host]
description = "First 4 chars of hostname (Docker container short id)"
command = "hostname | cut -c1-4"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:#0087af fg:#ffffff"
format = "[ $output ]($style)"

[directory]
style = "bg:#3a3a3a fg:#ffffff"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:#1c1c1c fg:#5fafff"
# Trailing marker so you can see at a glance you're on a slow FS.
format = "[ $symbol $branch ⚠ slow-fs ]($style)"

# git_status disabled — see header comment.
[git_status]
disabled = true

[cmd_duration]
min_time = 500
style = "fg:#ffaf00"
format = "[ took $duration ]($style)"

[status]
disabled = false
style = "fg:#ff5f5f"
symbol = "✖ "
format = '[$symbol$status]($style) '

[jobs]
style = "fg:#5fafff"
symbol = "✦"
format = "[$symbol$number]($style) "

[nodejs]
disabled = true
[python]
disabled = true
[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[docker_context]
disabled = true
